<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscribirse · Antigua Ladder League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #f7f7f5; color: #111113;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --red: #e4252e; --red-dark: #b81d24; --red-light: #fdecea;
      --dark: #111113; --text: #1c1c1e;
      --muted: #6b6b74; --light: #f7f7f5; --border: #e2e2de;
      --court: #4a7a50;
    }

    /* ── NAV ── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1160px; margin: 0 auto; padding: 0 24px; height: 60px;
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-brand img { height: 28px; }
    .nav-brand-divider { width: 1px; height: 18px; background: var(--border); }
    .nav-brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
      color: var(--red);
    }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; padding: 7px 14px;
      border: 1px solid var(--border); transition: color .2s;
    }
    .nav-back:hover { color: var(--dark); }
    .nav-user {
      display: flex; align-items: center; gap: 8px;
      background: #fff4f4; color: var(--red); border: 1.5px solid #fac5c7;
      padding: 5px 13px 5px 5px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .88rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      text-decoration: none; white-space: nowrap; transition: background .2s;
    }
    .nav-user:hover { background: #ffe8e8; }
    .nav-user-avatar {
      width: 26px; height: 26px; background: var(--red); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 900;
    }
    .nav-chip-admin {
      font-family: 'Space Mono', monospace; font-size: .7rem; font-weight: 700;
      background: #ff6f00; color: #fff; padding: 4px 10px;
      text-decoration: none; letter-spacing: .04em;
    }
    .nav-login-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .88rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      color: var(--red); border: 1.5px solid var(--red); padding: 6px 16px;
      text-decoration: none; transition: background .2s;
    }
    .nav-login-btn:hover { background: var(--red-light); }

    /* ── PAGE ── */
    .page-wrap { padding-top: 80px; padding-bottom: 80px; }

    /* ── PAGE HERO ── */
    .page-hero {
      background: var(--dark); padding: 40px 0 32px;
      position: relative; overflow: hidden; margin-bottom: 40px;
    }
    .page-hero::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 40px,
        rgba(255,255,255,.015) 40px, rgba(255,255,255,.015) 41px
      );
    }
    .page-hero-inner { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 0 24px; }
    .page-hero-label {
      font-family: 'Space Mono', monospace;
      font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
      color: var(--red); margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-hero-label::before { content: ''; display: block; width: 24px; height: 3px; background: var(--red); }
    .page-hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: .02em;
      color: #fff; line-height: .95; margin-bottom: 12px;
    }
    .page-hero-sub {
      font-size: .95rem; color: rgba(255,255,255,.45); max-width: 420px; line-height: 1.5;
    }

    /* ── GRID ── */
    .sessions-grid {
      max-width: 1160px; margin: 0 auto; padding: 0 24px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── SESSION CARD ── */
    .ses-card {
      background: #fff; border: 1px solid var(--border);
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      cursor: pointer;
    }
    .ses-card:hover:not(.ses-disabled) {
      border-color: var(--red);
      box-shadow: 0 4px 20px rgba(228,37,46,.1);
      transform: translateY(-2px);
    }
    .ses-card.ses-disabled { opacity: .45; cursor: default; pointer-events: none; }

    .ses-card-top {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .ses-num {
      font-family: 'Space Mono', monospace; font-size: .62rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    .ses-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 8px; border: 1.5px solid;
    }
    .badge-proxima  { color: var(--red);  border-color: var(--red);  background: var(--red-light); }
    .badge-pendiente{ color: var(--muted); border-color: var(--border); background: var(--light); }
    .badge-jugada   { color: var(--court); border-color: #b6d9ba; background: #f0f9f0; }
    .badge-llena    { color: #92400e; border-color: #fcd34d; background: #fffbeb; }

    .ses-card-body { padding: 16px; flex: 1; }
    .ses-fecha {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2.2rem;
      letter-spacing: .01em; text-transform: uppercase; line-height: 1; color: var(--dark);
    }
    .ses-dia { font-size: .85rem; color: var(--muted); font-weight: 500; margin-top: 2px; }

    .ses-horarios { display: flex; flex-direction: column; gap: 5px; margin-top: 14px; }
    .ses-h-row {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: var(--muted);
    }
    .ses-h-cat {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: .68rem;
      letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px;
    }
    .ses-h-cat.p { background: #d1fae5; color: #065f46; }
    .ses-h-cat.i { background: #dbeafe; color: #1e40af; }
    .ses-h-cat.o { background: #ede9fe; color: #5b21b6; }

    .ses-card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .ses-cupos {
      font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted);
    }
    .ses-cupos strong { color: var(--dark); font-size: .75rem; }
    .ses-cupos .cupos-zero { color: #92400e; }
    .ses-cta {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: .88rem;
      letter-spacing: .07em; text-transform: uppercase; color: var(--red);
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .ses-cta-arrow { transition: transform .2s; }
    .ses-card:hover:not(.ses-disabled) .ses-cta-arrow { transform: translateX(4px); }

    /* Skeleton */
    .cupos-skeleton {
      display: inline-block; width: 56px; height: 10px;
      background: linear-gradient(90deg, var(--border) 25%, #d8d8d4 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media (max-width: 600px) {
      .sessions-grid { grid-template-columns: 1fr; padding: 0 16px 48px; }
      .page-hero { padding: 28px 0 24px; margin-bottom: 28px; }
    }
  
    /* móvil: el nav no debe desbordar — ocultar logo Quattro y compactar marca */
    @media (max-width: 560px) {
      .nav-brand img[src*="quattro"] { display: none !important; }
      .nav-brand .nav-brand-divider + img[src*="quattro"] { display: none !important; }
      .nav-brand { gap: 8px; min-width: 0; }
      .nav-brand-name { font-size: .92rem; white-space: nowrap; }
      .nav-inner { padding: 0 14px; gap: 8px; }
    }

    /* móvil: compactar acciones del nav para que nada se corte */
    @media (max-width: 560px) {
      .nav-btn { padding: 7px 12px !important; font-size: .78rem !important; }
      .nav-user { padding: 4px !important; gap: 0 !important; }
      .nav-user > :not(.nav-user-avatar) { display: none; }
      .nav-user { font-size: 0 !important; }
      .nav-user .nav-user-avatar { font-size: .72rem !important; }
      button[title="Salir / cambiar de cuenta"] { padding: 5px 8px !important; font-size: .68rem !important; margin-left: 4px !important; }
      .nav-chip-admin { font-size: .6rem !important; padding: 4px 6px !important; }
      .nav-actions, #nav-auth-slot { gap: 6px !important; }
    }

    #nav-auth-slot { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img src="img/logo.png" alt="ALL" onerror="this.style.display='none'"/>
      <div class="nav-brand-divider"></div>
      <span class="nav-brand-name">Ladder League</span>
      <div class="nav-brand-divider"></div>
      <img src="img/quattro.png" alt="Quattro Club" style="height:28px;width:auto;background:#111113;padding:4px 9px;border-radius:4px;box-sizing:content-box" onerror="this.style.display='none'"/>
    </a>
    <div class="nav-actions">
      <a class="nav-back" href="index.html">← Inicio</a>
      <div id="nav-user-slot">
        <a class="nav-login-btn" id="nav-login-btn"
          href="https://antigua-pickleball.com/login?redirect=https://ladder.antigua-pickleball.com/inscribirse.html">
          Iniciar sesión
        </a>
      </div>
    </div>
  </div>
</div>

<!-- PAGE WRAP -->
<div class="page-wrap">

  <!-- HERO -->
  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-hero-label">Antigua Ladder League · Temporada 1</div>
      <div class="page-hero-title">Elige tu<br/>sesión</div>
      <p class="page-hero-sub">Selecciona la semana en que quieres jugar. Puedes inscribirte a más de una sesión.</p>
    </div>
  </div>

  <!-- GRID -->
  <div class="sessions-grid" id="sessions-grid">
    <!-- rendered by JS -->
  </div>

</div>

<script type="module">
  import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import '/js/auth-bridge-client.js';

  const FB_CONFIG = {
    apiKey:            "AIzaSyBBmUQR8AGdosXSGNK3galyBmFjkn6jOuM",
    authDomain:        "antigua-pickleball.firebaseapp.com",
    projectId:         "antigua-pickleball",
    storageBucket:     "antigua-pickleball.firebasestorage.app",
    messagingSenderId: "270487643715",
    appId:             "1:270487643715:web:701b74a71253ac599056f6"
  };
  const app  = initializeApp(FB_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const COLLECTION = 'ladder_registrations';
  const CAP_POR_CAT = 10;

  // Fallback — se sobreescribe con datos de Firestore
  let SEMANAS = [
    { num:1, fecha:'4 Jul',   dia:'Sábado', estado:'jugada'   },
    { num:2, fecha:'18 Jul',  dia:'Sábado', estado:'pendiente'},
    { num:3, fecha:'25 Jul',  dia:'Sábado', estado:'pendiente'},
    { num:4, fecha:'1 Ago',   dia:'Sábado', estado:'pendiente'},
    { num:5, fecha:'8 Ago',   dia:'Sábado', estado:'pendiente'},
    { num:6, fecha:'15 Ago',  dia:'Sábado', estado:'pendiente'},
    { num:7, fecha:'22 Ago',  dia:'Sábado', estado:'pendiente'},
    { num:8, fecha:'29 Ago',  dia:'Sábado', estado:'pendiente'},
  ];
  const CATS = ['principiante','intermedio','open'];
  const HORARIOS = [
    { key:'principiante', label:'P', hora:'8:00 – 9:40 am'    },
    { key:'intermedio',   label:'I', hora:'9:40 – 11:20 am'   },
    { key:'open',         label:'O', hora:'11:20 am – 1:00 pm'},
  ];

  // ── Nav user ──────────────────────────────────────────────────────────────
  const user = window.APAuth?.getUser?.() || null;
  function updateNav() {
    if (!user) return;
    const slot  = document.getElementById('nav-user-slot');
    const first = user.displayName?.split(' ')[0] || 'Jugador';
    const initials = (user.displayName||'J').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const isAdmin = user.role === 'admin';
    slot.innerHTML = `
      ${isAdmin ? `<a class="nav-chip-admin" href="admin.html">⚙ Admin</a>` : ''}
      <a class="nav-user" href="https://antigua-pickleball.com/perfil" target="_blank" rel="noopener">
        <div class="nav-user-avatar">${initials}</div>
        ${first}
      </a><button onclick="APAuth.signOut();location.href='https://antigua-pickleball.com/login.html?redirect='+encodeURIComponent(location.href)" title="Salir / cambiar de cuenta" style="font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#6b6b74;background:none;border:1px solid #e2e2de;padding:6px 11px;cursor:pointer;margin-left:6px">Salir</button>`;
  }
  updateNav();

  await signInAnonymously(auth).catch(()=>{});

  // ¿Invitación a pagar un cupo liberado (slot_available) vigente? Sin invitedAt = congelado,
  // aún no avisado (sigue bloqueando, no vence hasta que se avise). Mismo criterio que sesion.html/admin.html.
  const HOLD_HOURS = 3;
  function isInviteLive(p) {
    if (p.status !== 'slot_available') return false;
    if (!p.invitedAt) return true;
    const invitedAtMs = p.invitedAt.toMillis ? p.invitedAt.toMillis() : (p.invitedAt.seconds || 0) * 1000;
    return Date.now() < invitedAtMs + HOLD_HOURS * 3_600_000;
  }

  // ── Load counts from Firestore ────────────────────────────────────────────
  async function loadCounts() {
    const counts = {};
    SEMANAS.forEach(s => {
      counts[s.num] = {};
      CATS.forEach(c => { counts[s.num][c] = { confirmed:0, waitlist:0 }; });
    });
    try {
      await Promise.all(SEMANAS.map(async s => {
        const snap = await getDoc(doc(db, COLLECTION, `t1_sesion_${s.num}`));
        if (!snap.exists()) return;
        const inscritos = snap.data().inscritos || [];
        inscritos.forEach(p => {
          const cat = p.categoria;
          if (!counts[s.num][cat]) return;
          // Un cupo congelado (slot_available vigente) cuenta como ocupado para el público:
          // nadie ajeno a la lista de espera debe ver ese cupo como disponible.
          if (p.status === 'confirmed' || isInviteLive(p)) counts[s.num][cat].confirmed++;
          else if (p.status === 'waitlist' || p.status === 'pending_review') counts[s.num][cat].waitlist++;
        });
      }));
    } catch(e) { console.warn('Error cargando cupos:', e); }
    return counts;
  }

  function totalConfirmed(counts, num) {
    return CATS.reduce((a,c) => a + counts[num][c].confirmed, 0);
  }
  const TOTAL_MAX = CAP_POR_CAT * CATS.length; // 30

  // ── Render ────────────────────────────────────────────────────────────────
  function badgeHtml(estado, available) {
    if (estado === 'jugada')    return `<span class="ses-badge badge-jugada">Finalizada</span>`;
    if (estado === 'proxima' && available <= 0)
                                return `<span class="ses-badge badge-llena">Lista de espera</span>`;
    if (estado === 'proxima')   return `<span class="ses-badge badge-proxima">Próxima</span>`;
    return `<span class="ses-badge badge-pendiente">Próximamente</span>`;
  }

  function cuposHtml(estado, available, skeleton) {
    if (estado !== 'proxima') return `<span class="ses-cupos">Abre pronto</span>`;
    if (skeleton) return `<span class="ses-cupos"><span class="cupos-skeleton"></span></span>`;
    if (available > 0)
      return `<span class="ses-cupos"><strong>${available}</strong> / ${TOTAL_MAX} cupos</span>`;
    return `<span class="ses-cupos cupos-zero">Cupos llenos · lista de espera</span>`;
  }

  function renderCards(counts, skeleton = false) {
    const grid = document.getElementById('sessions-grid');
    grid.innerHTML = '';
    SEMANAS.forEach(s => {
      const confirmed  = skeleton ? 0 : totalConfirmed(counts, s.num);
      const available  = TOTAL_MAX - confirmed;
      const disabled   = s.estado === 'jugada';
      const tag        = disabled ? 'div' : 'a';
      const hrefAttr   = disabled ? '' : `href="sesion.html?n=${s.num}"`;

      const horariosHtml = HORARIOS.map(h => `
        <div class="ses-h-row">
          <span class="ses-h-cat ${h.key[0]}">${h.label}</span>
          ${h.hora}
        </div>`).join('');

      grid.innerHTML += `
        <${tag} class="ses-card${disabled?' ses-disabled':''}" ${hrefAttr}>
          <div class="ses-card-top">
            <span class="ses-num">Semana ${s.num}</span>
            ${skeleton
              ? `<span class="ses-badge badge-${s.estado === 'proxima' ? 'proxima' : 'pendiente'}">${s.estado === 'proxima' ? 'Próxima' : 'Próximamente'}</span>`
              : badgeHtml(s.estado, available)}
          </div>
          <div class="ses-card-body">
            <div class="ses-fecha">${s.fecha}</div>
            <div class="ses-dia">${s.dia}</div>
            <div class="ses-horarios">${horariosHtml}</div>
          </div>
          <div class="ses-card-footer">
            ${cuposHtml(s.estado, available, skeleton)}
            ${!disabled ? `<span class="ses-cta">Inscribirme <span class="ses-cta-arrow">→</span></span>` : ''}
          </div>
        </${tag}>`;
    });
  }

  // Cargar config de sesiones desde Firestore
  try {
    const cfgSnap = await getDoc(doc(db, 'ladder_config', 't1_semanas'));
    if (cfgSnap.exists() && cfgSnap.data().semanas?.length) {
      SEMANAS = cfgSnap.data().semanas;
    }
  } catch(e) { /* usa fallback */ }

  // Skeleton mientras carga
  renderCards(null, true);
  const counts = await loadCounts();
  renderCards(counts, false);
</script>
</body>
</html>
